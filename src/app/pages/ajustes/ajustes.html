<div class="page-header">
  <h2>Ajustes del sistema</h2>
</div>

@if(!autorizado){
<mat-card class="login-card">
  <h3>Acceso administrador</h3>

  <mat-form-field appearance="outline">
    <mat-label>Contraseña</mat-label>
    <input matInput type="password" [(ngModel)]="password" (keyup.enter)="validar()">
  </mat-form-field>

  <button mat-raised-button color="primary" (click)="validar()">
    Entrar
  </button>
</mat-card>
}

@if(autorizado){

<div class="admin-grid">

  <!-- ADMIN -->
  <mat-card class="card">
    <h3>Administración</h3>

    <div class="menu">
      <button mat-stroked-button color="primary" routerLink="/medicos">
        👨‍⚕️ Médicos
      </button>

      <button mat-stroked-button color="primary" routerLink="/enfermeros">
        🧑‍⚕️ Enfermeros
      </button>

      <button mat-stroked-button color="primary" routerLink="/plantillas">
        📄 Plantillas
      </button>
    </div>

    <button class="logout" mat-button color="warn" (click)="logout()">
      Cerrar sesión
    </button>
  </mat-card>

  <!-- GRUPOS -->
  <mat-card class="card">
    <h3>Grupos de plantillas</h3>

    <div class="grupo-form">
      <mat-form-field appearance="outline">
        <mat-label>Nuevo grupo</mat-label>
        <input matInput [(ngModel)]="nuevoGrupo" (keyup.enter)="agregarGrupo()">
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="agregarGrupo()">
        Agregar
      </button>
    </div>

    <div class="lista">
      @if (grupos.length === 0) {
        <div class="empty-state">No hay grupos creados</div>
      } @else {
        @for (g of grupos; track g.id) {
          <div class="item">
            <span class="nombre">{{ g.nombre }}</span>

            <button mat-icon-button color="warn" (click)="eliminarGrupo(g.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        }
      }
    </div>

  </mat-card>

</div>
}
